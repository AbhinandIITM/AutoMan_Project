# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_1_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    arm_2_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    dual_arms_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_1_controller:
  ros__parameters:
    joints:
      - arm_1_shoulder_pan_joint
      - arm_1_shoulder_lift_joint
      - arm_1_elbow_joint
      - arm_1_wrist_1_joint
      - arm_1_wrist_2_joint
      - arm_1_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
arm_2_controller:
  ros__parameters:
    joints:
      - arm_2_shoulder_pan_joint
      - arm_2_shoulder_lift_joint
      - arm_2_elbow_joint
      - arm_2_wrist_1_joint
      - arm_2_wrist_2_joint
      - arm_2_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
dual_arms_controller:
  ros__parameters:
    joints:
      - arm_1_shoulder_pan_joint
      - arm_1_shoulder_lift_joint
      - arm_1_elbow_joint
      - arm_1_wrist_1_joint
      - arm_1_wrist_2_joint
      - arm_1_wrist_3_joint
      - arm_2_shoulder_pan_joint
      - arm_2_shoulder_lift_joint
      - arm_2_elbow_joint
      - arm_2_wrist_1_joint
      - arm_2_wrist_2_joint
      - arm_2_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity